databases:
  - name: stock-haven-db
    plan: free
    databaseName: stock_haven
    user: stock_haven

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: stock-haven-api
    env: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: stock-haven-db
          property: connectionString
      - key: VAPID_PUBLIC_KEY
        value: BMCrpsvLCo0S4AeIImV8M5bb_SVokny93_G87uDVo5TPLjdukN-mnAWSo4UNK1sf26ybgtrvzSYAnq9Ge01zUs4
      - key: VAPID_EMAIL
        value: mailto:aaronjalarge@gmail.com
      # Set these in the Render dashboard (Environment tab):
      - key: JWT_SECRET
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false

  # ── Frontend Static Site ───────────────────────────────────────────────────
  - type: static
    name: stock-haven-client
    plan: free
    region: frankfurt
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set these in the Render dashboard after the API service deploys:
      - key: VITE_API_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
